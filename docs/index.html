<html>
<head>
<title>Fresco Settings</title>
</head>
<body style="background-color: lightblue;">
<h1>Settings Page WIP</h1>
<p>This is just a check to see if the page loads</p>

<input id='background_color_input' type='text' value='000001'>
  Background Color
</input>
<input id='foreground_color_input' type='text' value='000000'>
  Foreground Color
</input>
<input id='second_tick_checkbox' type='checkbox'>
  Show Date
</input>
<input id='animations_checkbox' type='checkbox'>
  Temp in F
</input>
<input id='submit_button' type='button' value='Save & Exit'>


</body>
<script>
  

  // Get a handle to the button's HTML element
  var submitButton = document.getElementById('submit_button');
  var backgroundColor = document.getElementById('background_color_input');

  function getQueryParam(variable, defaultValue) {
    var query = location.search.substring(1);
    var vars = query.split('&');
    for (var i = 0; i < vars.length; i++) {
      var pair = vars[i].split('=');
      if (pair[0] === variable) {
        return decodeURIComponent(pair[1]);
      }
    }
    return defaultValue || false;
  };

  var xhrRequest = function (url, type, callback) {
    var xhr = new XMLHttpRequest();
    xhr.onload = function () {
      callback(this.responseText);
    };
    xhr.open(type, url);
    xhr.send();
  };

  // Get the platform from the URL:
  var platform = getQueryParam('platform', 'unknown');
  console.log(platform);
  backgroundColor.value = platform;

  // Add a 'click' listener
  submitButton.addEventListener('click', function() {
    // Get the config data from the UI elements
    var backgroundColor = document.getElementById('background_color_input');
    var foregroundColor = document.getElementById('foreground_color_input');
    var secondTickCheckbox = document.getElementById('second_tick_checkbox');
    var animationsCheckbox = document.getElementById('animations_checkbox');

    // Make a data object to be sent, coercing value types to integers
    var options = {
      'background_color': parseInt(backgroundColor.value, 16),
      'foreground_color': parseInt(foregroundColor.value, 16),
      'second_tick_checkbox': secondTickCheckbox.checked ? 1 : 0,
      'animations_checkbox': animationsCheckbox.checked ? 1 : 0
    };
 
    console.log(parseInt(backgroundColor.value, 16), parseInt(foregroundColor.value, 16), secondTickCheckbox.checked ? 1 : 0, animationsCheckbox.checked ? 1 : 0);

    // Determine the correct return URL (emulator vs real watch)
    var return_to = getQueryParam('return_to', 'pebblejs://close#');

    // Encode and send the data when the page closes
    document.location = return_to + encodeURIComponent(JSON.stringify(options));

    //fetch(return_to + encodeURIComponent(JSON.stringify(options)));

    //const iframe = document.createElement("iframe");
    //iframe.src = return_to + encodeURIComponent(JSON.stringify(options));
    //iframe.style.display = "none";
    //document.body.appendChild(iframe);

  });


</script>


</html>
